<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#121212" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Raaga Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1db954;
      --bg: #121212;
      --bg2: #181818;
      --bg3: #282828;
      --text: #ffffff;
      --text2: #b3b3b3;
      --text3: #727272;
      --font: 'Outfit', sans-serif;
      --nav-h: 68px;
      --mini-h: 72px;
    }
    html, body { height: 100%; background: #000; }
    body { font-family: var(--font); -webkit-font-smoothing: antialiased; overscroll-behavior: none; }

    #app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      position: relative;
      overflow: hidden;
    }

    /* SCREENS */
    .screen { display: none; flex-direction: column; height: 100dvh; overflow: hidden; }
    .screen.active { display: flex; }

    .scroll-content {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding-bottom: calc(var(--mini-h) + var(--nav-h) + 20px);
      -webkit-overflow-scrolling: touch;
    }
    .scroll-content::-webkit-scrollbar { display: none; }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px; height: var(--nav-h);
      background: #0a0a0a; border-top: 1px solid #282828;
      display: flex; align-items: flex-start; padding-top: 10px; z-index: 200;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
      cursor: pointer; color: var(--text3); border: none; background: none; font-family: var(--font);
      transition: color 0.15s;
    }
    .nav-item.active { color: var(--text); }
    .nav-item svg { width: 22px; height: 22px; }
    .nav-item span { font-size: 10px; font-weight: 500; }

    /* MINI PLAYER */
    .mini-player {
      position: fixed; bottom: var(--nav-h); left: 50%; transform: translateX(-50%);
      width: calc(100% - 16px); max-width: 414px; height: var(--mini-h);
      background: #282828; border-radius: 12px;
      display: none; align-items: center; padding: 0 12px; gap: 10px;
      z-index: 199; cursor: pointer; border: 1px solid #383838;
    }
    .mini-player.visible { display: flex; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateX(-50%) translateY(80px); opacity:0; } to { transform: translateX(-50%) translateY(0); opacity:1; } }
    .mini-thumb { width: 44px; height: 44px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .mini-info { flex: 1; min-width: 0; }
    .mini-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mini-artist { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .mini-controls { display: flex; align-items: center; gap: 6px; }
    .mini-btn { background: none; border: none; cursor: pointer; color: var(--text2); display: flex; align-items: center; padding: 4px; }
    .mini-play-btn { width: 34px; height: 34px; background: var(--text); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; flex-shrink: 0; }
    .mini-progress { position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: #444; border-radius: 0 0 12px 12px; overflow: hidden; }
    .mini-progress-fill { height: 100%; background: var(--green); transition: width 0.8s linear; }

    /* HOME */
    .home-header { padding: 52px 20px 16px; display: flex; align-items: center; justify-content: space-between; background: linear-gradient(180deg,#1a2a1a,var(--bg)); }
    .home-header h1 { font-size: 22px; font-weight: 800; }
    .avatar { width: 34px; height: 34px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #000; }

    .lang-pills { display: flex; gap: 8px; padding: 0 16px 16px; overflow-x: auto; flex-shrink: 0; }
    .lang-pills::-webkit-scrollbar { display: none; }
    .pill { flex-shrink: 0; padding: 7px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; border: 1px solid #444; color: var(--text2); cursor: pointer; background: transparent; transition: all 0.15s; font-family: var(--font); }
    .pill:hover { border-color: var(--text2); color: var(--text); }
    .pill.active { background: var(--text); border-color: var(--text); color: #000; }

    .section { padding: 0 16px 20px; }
    .section-title { font-size: 20px; font-weight: 800; margin-bottom: 14px; }

    .h-scroll { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 4px; }
    .h-scroll::-webkit-scrollbar { display: none; }
    .feat-card { flex-shrink: 0; width: 140px; cursor: pointer; transition: transform 0.15s; }
    .feat-card:hover { transform: scale(1.03); }
    .feat-thumb { width: 140px; height: 140px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 48px; margin-bottom: 8px; }
    .feat-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .feat-sub { font-size: 11px; color: var(--text2); margin-top: 3px; }

    /* SONG ITEM */
    .song-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; cursor: pointer; transition: background 0.1s; border-radius: 8px; }
    .song-item:hover { background: var(--bg3); }
    .song-item.playing .song-title { color: var(--green); }
    .song-thumb-wrap { width: 50px; height: 50px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; position: relative; }
    .play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); border-radius: 8px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.15s; }
    .song-item:hover .play-overlay { opacity: 1; }
    .song-info { flex: 1; min-width: 0; }
    .song-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .song-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; }
    .song-artist { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lang-badge { font-size: 9px; font-weight: 700; color: var(--green); background: rgba(29,185,84,0.1); padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
    .song-dur { font-size: 12px; color: var(--text3); flex-shrink: 0; }

    /* SEARCH */
    .search-header { padding: 52px 16px 14px; }
    .search-header h2 { font-size: 26px; font-weight: 800; margin-bottom: 14px; }
    .search-box { display: flex; align-items: center; gap: 10px; background: var(--text); border-radius: 8px; padding: 10px 14px; }
    .search-box input { flex: 1; background: none; border: none; outline: none; font-size: 15px; font-family: var(--font); color: #000; }
    .search-box input::placeholder { color: #777; }
    .clear-btn { background: none; border: none; cursor: pointer; color: #777; font-size: 20px; line-height: 1; padding: 0; font-family: var(--font); }

    .browse-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px; margin-top: 4px; }
    .browse-cat { border-radius: 10px; height: 90px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; cursor: pointer; transition: transform 0.15s; position: relative; overflow: hidden; }
    .browse-cat:hover { transform: scale(1.02); }
    .cat-emoji { position: absolute; right: 10px; bottom: 6px; font-size: 36px; opacity: 0.6; transform: rotate(-15deg); }

    /* LIBRARY */
    .library-header { padding: 52px 16px 16px; display: flex; align-items: center; justify-content: space-between; }
    .library-header h2 { font-size: 26px; font-weight: 800; }
    .lib-item { display: flex; align-items: center; gap: 14px; padding: 10px 16px; cursor: pointer; transition: background 0.1s; border-radius: 8px; }
    .lib-item:hover { background: var(--bg3); }
    .lib-thumb { width: 56px; height: 56px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
    .lib-name { font-size: 15px; font-weight: 600; }
    .lib-sub { font-size: 12px; color: var(--text2); margin-top: 3px; }

    /* NOW PLAYING */
    .now-playing-screen {
      position: fixed; inset: 0; z-index: 300;
      display: flex; flex-direction: column;
      background: var(--bg);
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
      max-width: 430px; left: 50%; margin-left: -215px;
    }
    @media (max-width: 430px) { .now-playing-screen { left: 0; margin-left: 0; } }
    .now-playing-screen.open { transform: translateY(0); }

    .np-bg { position: absolute; inset: 0; opacity: 0.25; transition: background 0.5s; pointer-events: none; }
    .np-content { position: relative; display: flex; flex-direction: column; height: 100%; overflow-y: auto; padding-bottom: 32px; }
    .np-content::-webkit-scrollbar { display: none; }

    .np-header { display: flex; align-items: center; justify-content: space-between; padding: 52px 20px 16px; }
    .np-header-center { font-size: 11px; font-weight: 700; color: var(--text2); letter-spacing: 1.5px; }
    .np-icon-btn { background: none; border: none; cursor: pointer; color: var(--text2); padding: 4px; display: flex; }
    .np-icon-btn:hover { color: var(--text); }

    .np-art-wrap { padding: 0 28px; margin-bottom: 28px; }
    .np-art { width: 100%; aspect-ratio: 1; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 100px; box-shadow: 0 24px 80px rgba(0,0,0,0.6); transition: transform 0.3s; }
    .np-art.playing { animation: artpulse 3s ease-in-out infinite; }
    @keyframes artpulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.025)} }

    .np-info { padding: 0 24px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .np-title { font-size: 22px; font-weight: 800; }
    .np-artist { font-size: 15px; color: var(--text2); margin-top: 4px; }
    .heart-btn { background: none; border: none; cursor: pointer; padding: 4px; display: flex; transition: transform 0.15s; }
    .heart-btn:hover { transform: scale(1.2); }

    .lang-badge-np { display: inline-flex; margin: 0 24px 20px; background: rgba(29,185,84,0.12); color: var(--green); border-radius: 6px; padding: 4px 10px; font-size: 11px; font-weight: 700; }

    .progress-area { padding: 0 24px; margin-bottom: 16px; }
    .progress-bar-wrap { height: 4px; background: #535353; border-radius: 2px; cursor: pointer; position: relative; transition: height 0.15s; }
    .progress-bar-wrap:hover { height: 6px; }
    .progress-bar-fill { height: 100%; background: var(--text); border-radius: 2px; transition: width 0.8s linear; }
    .progress-times { display: flex; justify-content: space-between; margin-top: 8px; font-size: 11px; color: var(--text3); }

    .np-controls { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; margin-bottom: 24px; }
    .ctrl-btn { background: none; border: none; cursor: pointer; color: var(--text3); display: flex; align-items: center; padding: 6px; transition: color 0.15s; }
    .ctrl-btn:hover { color: var(--text); }
    .ctrl-btn.active { color: var(--green); }
    .play-btn { width: 64px; height: 64px; background: var(--text); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; transition: transform 0.1s; flex-shrink: 0; }
    .play-btn:hover { transform: scale(1.06); }
    .play-btn:active { transform: scale(0.96); }

    .vol-area { padding: 0 24px; display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
    .vol-bar { flex: 1; height: 4px; background: #535353; border-radius: 2px; cursor: pointer; }
    .vol-fill { height: 100%; background: var(--text2); border-radius: 2px; }

    .queue-section { padding: 0 16px; }
    .queue-title { font-size: 12px; font-weight: 700; color: var(--text3); letter-spacing: 1px; margin-bottom: 12px; }

    .empty { padding: 48px 16px; text-align: center; color: var(--text2); font-size: 14px; }
  </style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="home-header">
      <h1 id="greet">Good evening</h1>
      <div class="avatar">R</div>
    </div>
    <div class="lang-pills" id="langPills"></div>
    <div class="scroll-content">
      <div class="section">
        <div class="section-title">Featured Playlists</div>
        <div class="h-scroll" id="playlistCards"></div>
      </div>
      <div class="section">
        <div class="section-title" id="songListTitle">All Songs</div>
        <div id="songList"></div>
      </div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="screen" id="screen-search">
    <div class="search-header">
      <h2>Search</h2>
      <div class="search-box">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="searchInput" placeholder="Songs, artists, languages..." oninput="doSearch(this.value)" autocomplete="off" />
        <button class="clear-btn" id="clearBtn" onclick="clearSearch()" style="display:none">×</button>
      </div>
    </div>
    <div class="scroll-content">
      <div id="searchResults"></div>
      <div id="browseCats">
        <div style="padding:8px 16px 12px;font-size:20px;font-weight:800">Browse by Language</div>
        <div class="browse-grid" id="browseGrid"></div>
      </div>
    </div>
  </div>

  <!-- LIBRARY -->
  <div class="screen" id="screen-library">
    <div class="library-header">
      <h2>Your Library</h2>
    </div>
    <div class="scroll-content">
      <div class="lib-item">
        <div class="lib-thumb" style="background:#1a2a47">❤️</div>
        <div>
          <div class="lib-name">Liked Songs</div>
          <div class="lib-sub" id="likedCount">Playlist • 0 songs</div>
        </div>
      </div>
      <div id="libPlaylists"></div>
      <div style="padding:20px 16px 4px;font-size:18px;font-weight:800">Recently Played</div>
      <div id="recentSongs"></div>
    </div>
  </div>

  <!-- MINI PLAYER -->
  <div class="mini-player" id="miniPlayer" onclick="openNowPlaying()">
    <div class="mini-thumb" id="miniThumb">🎵</div>
    <div class="mini-info">
      <div class="mini-title" id="miniTitle">—</div>
      <div class="mini-artist" id="miniArtist">—</div>
    </div>
    <div class="mini-controls" onclick="event.stopPropagation()">
      <button class="mini-btn" onclick="prevSong()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="#fff" stroke-width="2"/></svg>
      </button>
      <button class="mini-play-btn" onclick="togglePlay()">
        <span id="miniPlayIcon">▶</span>
      </button>
      <button class="mini-btn" onclick="nextSong()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="#fff" stroke-width="2"/></svg>
      </button>
    </div>
    <div class="mini-progress"><div class="mini-progress-fill" id="miniProgressFill"></div></div>
  </div>

  <!-- NOW PLAYING -->
  <div class="now-playing-screen" id="nowPlaying">
    <div class="np-bg" id="npBg"></div>
    <div class="np-content">
      <div class="np-header">
        <button class="np-icon-btn" onclick="closeNowPlaying()">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <span class="np-header-center">NOW PLAYING</span>
        <button class="np-icon-btn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1" fill="currentColor"/><circle cx="19" cy="12" r="1" fill="currentColor"/><circle cx="5" cy="12" r="1" fill="currentColor"/></svg>
        </button>
      </div>
      <div class="np-art-wrap">
        <div class="np-art" id="npArt">🎵</div>
      </div>
      <div class="np-info">
        <div>
          <div class="np-title" id="npTitle">Song Title</div>
          <div class="np-artist" id="npArtist">Artist</div>
        </div>
        <button class="heart-btn" onclick="toggleLike()" id="heartBtn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#b3b3b3" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
      </div>
      <div class="lang-badge-np" id="npLang">Tamil</div>
      <div class="progress-area">
        <div class="progress-bar-wrap" id="progressBar" onclick="seekTo(event)">
          <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
        </div>
        <div class="progress-times">
          <span id="currentTime">0:00</span>
          <span id="totalTime">0:00</span>
        </div>
      </div>
      <div class="np-controls">
        <button class="ctrl-btn" id="shuffleBtn" onclick="toggleShuffle()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
        </button>
        <button class="ctrl-btn" style="color:#fff" onclick="prevSong()">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="#fff"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="#fff" stroke-width="2"/></svg>
        </button>
        <button class="play-btn" onclick="togglePlay()">
          <span id="mainPlayIcon" style="font-size:22px;color:#000;margin-left:2px">▶</span>
        </button>
        <button class="ctrl-btn" style="color:#fff" onclick="nextSong()">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="#fff"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="#fff" stroke-width="2"/></svg>
        </button>
        <button class="ctrl-btn" id="repeatBtn" onclick="toggleRepeat()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </button>
      </div>
      <div class="vol-area">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#727272" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/></svg>
        <div class="vol-bar" onclick="setVol(event)"><div class="vol-fill" id="volFill" style="width:70%"></div></div>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#727272" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
      </div>
      <div class="queue-section">
        <div class="queue-title">NEXT UP</div>
        <div id="queueList"></div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-item active" id="nav-home" onclick="showTab('home')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9.5L12 3l9 6.5V21H15v-6H9v6H3V9.5z"/></svg>
      <span>Home</span>
    </button>
    <button class="nav-item" id="nav-search" onclick="showTab('search')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Search</span>
    </button>
    <button class="nav-item" id="nav-library" onclick="showTab('library')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span>Library</span>
    </button>
  </nav>
</div>

<script>
// ── DATA ──────────────────────────────────────────────
const SONGS = [
  {id:1, title:'Kannaana Kanney', artist:'Sid Sriram', album:'Viswasam', lang:'Tamil', duration:222, emoji:'🎵', color:'#1a472a'},
  {id:2, title:'Rowdy Baby', artist:'Yuvan Shankar Raja', album:'Maari 2', lang:'Tamil', duration:241, emoji:'🎶', color:'#2a1a47'},
  {id:3, title:'Butterfly', artist:'D. Imman', album:'Thalapathy 65', lang:'Tamil', duration:208, emoji:'🦋', color:'#1a3a3a'},
  {id:4, title:'Unnai Kaanadhu Naan', artist:'A.R. Rahman', album:'Vinnaithaandi Varuvaayaa', lang:'Tamil', duration:255, emoji:'🌙', color:'#3a1a1a'},
  {id:5, title:'Anbil Avan', artist:'Sathyaprakash', album:'96', lang:'Tamil', duration:238, emoji:'💫', color:'#1a2a3a'},
  {id:6, title:'Saami Saami', artist:'Thaman S', album:'Pushpa', lang:'Telugu', duration:235, emoji:'🎤', color:'#3a1a2a'},

  {id:17, title:'Jimikki Kammal', artist:'Vineeth Sreenivasan', album:'Velipadinte Pusthakam', lang:'Malayalam', duration:227, emoji:'🎵', color:'#3a2a3a'},
  {id:18, title:'Ninna Nambide', artist:'Ajay Warrior', album:'KGF Chapter 2', lang:'Kannada', duration:225, emoji:'🔥', color:'#3a3a1a'},
  {id:19, title:'Salaga Salaga', artist:'Ravi Basrur', album:'KGF Chapter 2', lang:'Kannada', duration:218, emoji:'⚡', color:'#1a1a2a'},
  {id:20, title:'Rowdy Rowdy', artist:'Devi Sri Prasad', album:'Bangarraju', lang:'Telugu', duration:232, emoji:'🎸', color:'#2a1a3a'},
];

const PLAYLISTS = [
  {id:1, name:'Tamil Hits 2025', lang:'Tamil', emoji:'🎵', color:'#1a472a', count:42},
  {id:2, name:'Telugu Blockbusters', lang:'Telugu', emoji:'🎶', color:'#3a1a47', count:38},
  {id:3, name:'English Pop Mix', lang:'English', emoji:'🎸', color:'#47341a', count:55},
  {id:4, name:'Hindi Classics', lang:'Hindi', emoji:'🥁', color:'#1a2a47', count:60},
  {id:5, name:'Malayalam Melodies', lang:'Malayalam', emoji:'🎤', color:'#471a2a', count:33},
  {id:6, name:'Kannada Beats', lang:'Kannada', emoji:'🔥', color:'#3a3a1a', count:28},
];

const LANGS = ['All','Tamil','Telugu','Hindi','English','Malayalam','Kannada'];
const BROWSE = [
  {label:'Tamil', color:'#1a472a', emoji:'🎵'},
  {label:'Telugu', color:'#3a1a47', emoji:'🎤'},
  {label:'Hindi', color:'#471a1a', emoji:'🎶'},
  {label:'English', color:'#1a2a47', emoji:'🎸'},
  {label:'Malayalam', color:'#473a1a', emoji:'🎺'},
  {label:'Kannada', color:'#1a3a47', emoji:'🔥'},
];

// ── STATE ─────────────────────────────────────────────
let currentSong = null;
let isPlaying = false;
let progress = 0;
let isShuffle = false;
let isRepeat = false;
let likedSongs = new Set();
let timer = null;
let currentLang = 'All';
let activeTab = 'home';

// ── FORMAT ────────────────────────────────────────────
function fmt(s) { s = Math.floor(s); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }

// ── INIT ──────────────────────────────────────────────
function init() {
  const h = new Date().getHours();
  document.getElementById('greet').textContent = h<12?'Good morning':h<17?'Good afternoon':'Good evening';

  // Lang pills
  const pills = document.getElementById('langPills');
  pills.innerHTML = LANGS.map(l=>`<button class="pill${l==='All'?' active':''}" onclick="filterLang('${l}',this)">${l}</button>`).join('');

  // Featured playlists
  document.getElementById('playlistCards').innerHTML = PLAYLISTS.map(pl=>`
    <div class="feat-card" onclick="filterLang('${pl.lang}',null)">
      <div class="feat-thumb" style="background:${pl.color}">${pl.emoji}</div>
      <div class="feat-name">${pl.name}</div>
      <div class="feat-sub">${pl.count} songs</div>
    </div>`).join('');

  // Browse grid
  document.getElementById('browseGrid').innerHTML = BROWSE.map(c=>`
    <div class="browse-cat" style="background:${c.color}" onclick="searchByLang('${c.label}')">
      ${c.label}<span class="cat-emoji">${c.emoji}</span>
    </div>`).join('');

  // Library playlists
  document.getElementById('libPlaylists').innerHTML = PLAYLISTS.map(pl=>`
    <div class="lib-item" onclick="filterLang('${pl.lang}',null);showTab('home')">
      <div class="lib-thumb" style="background:${pl.color}">${pl.emoji}</div>
      <div>
        <div class="lib-name">${pl.name}</div>
        <div class="lib-sub">Playlist • ${pl.count} songs</div>
      </div>
    </div>`).join('');

  // Recent songs in library
  document.getElementById('recentSongs').innerHTML = SONGS.slice(0,6).map(s=>songCard(s)).join('');

  renderSongs();
}

// ── SONG CARD HTML ────────────────────────────────────
function songCard(s) {
  const isCur = currentSong && currentSong.id === s.id;
  return `<div class="song-item${isCur?' playing':''}" onclick="playSong(${s.id})">
    <div class="song-thumb-wrap" style="background:${s.color}">
      ${s.emoji}
      <div class="play-overlay">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </div>
    </div>
    <div class="song-info">
      <div class="song-title">${s.title}</div>
      <div class="song-meta">
        <span class="song-artist">${s.artist}</span>
        <span class="lang-badge">${s.lang}</span>
      </div>
    </div>
    <span class="song-dur">${fmt(s.duration)}</span>
  </div>`;
}

// ── RENDER SONGS ──────────────────────────────────────
function renderSongs() {
  const filtered = currentLang === 'All' ? SONGS : SONGS.filter(s => s.lang === currentLang);
  document.getElementById('songListTitle').textContent = currentLang === 'All' ? 'All Songs' : currentLang + ' Songs';
  document.getElementById('songList').innerHTML = filtered.length
    ? filtered.map(songCard).join('')
    : '<div class="empty">No songs found</div>';
}

function filterLang(lang, btn) {
  currentLang = lang;
  if (btn) {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
  } else {
    document.querySelectorAll('.pill').forEach(p => {
      p.classList.toggle('active', p.textContent === lang || (lang !== 'All' && p.textContent === lang));
    });
  }
  renderSongs();
}

// ── SEARCH ────────────────────────────────────────────
function doSearch(q) {
  const clearBtn = document.getElementById('clearBtn');
  const browseCats = document.getElementById('browseCats');
  const sr = document.getElementById('searchResults');
  clearBtn.style.display = q ? 'block' : 'none';
  if (!q.trim()) { sr.innerHTML = ''; browseCats.style.display = ''; return; }
  browseCats.style.display = 'none';
  const ql = q.toLowerCase();
  const res = SONGS.filter(s =>
    s.title.toLowerCase().includes(ql) || s.artist.toLowerCase().includes(ql) ||
    s.lang.toLowerCase().includes(ql) || s.album.toLowerCase().includes(ql)
  );
  sr.innerHTML = res.length
    ? '<div style="padding:8px 0">' + res.map(songCard).join('') + '</div>'
    : '<div class="empty">No results for "' + q + '"</div>';
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  doSearch('');
}

function searchByLang(lang) {
  document.getElementById('searchInput').value = lang;
  doSearch(lang);
  document.getElementById('clearBtn').style.display = 'block';
}

// ── PLAYER ────────────────────────────────────────────
function playSong(id) {
  currentSong = SONGS.find(s => s.id === id);
  isPlaying = true;
  progress = 0;
  updateNowPlaying();
  updateMiniPlayer();
  setPlayIcons(true);
  startTimer();
  openNowPlaying();
  renderSongs();
  document.getElementById('recentSongs').innerHTML = SONGS.slice(0,6).map(songCard).join('');
}

function updateNowPlaying() {
  const s = currentSong;
  document.getElementById('npTitle').textContent = s.title;
  document.getElementById('npArtist').textContent = s.artist;
  document.getElementById('npLang').textContent = s.lang;
  const art = document.getElementById('npArt');
  art.textContent = s.emoji;
  art.style.background = `linear-gradient(135deg, ${s.color}, #1a1a1a)`;
  art.classList.toggle('playing', isPlaying);
  document.getElementById('totalTime').textContent = fmt(s.duration);
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('currentTime').textContent = '0:00';
  document.getElementById('npBg').style.background = `radial-gradient(ellipse at top, ${s.color} 0%, #121212 60%)`;
  updateHeart();
  renderQueue();
}

function updateMiniPlayer() {
  const s = currentSong;
  const mp = document.getElementById('miniPlayer');
  mp.classList.add('visible');
  document.getElementById('miniThumb').textContent = s.emoji;
  document.getElementById('miniThumb').style.background = s.color;
  document.getElementById('miniTitle').textContent = s.title;
  document.getElementById('miniArtist').textContent = s.artist;
}

function renderQueue() {
  const idx = SONGS.findIndex(s => s.id === currentSong.id);
  const next = SONGS.slice(idx+1, idx+4);
  document.getElementById('queueList').innerHTML = next.length
    ? next.map(s=>`<div class="song-item" onclick="playSong(${s.id})">
        <div class="song-thumb-wrap" style="background:${s.color};width:42px;height:42px;font-size:20px">${s.emoji}</div>
        <div class="song-info"><div class="song-title" style="font-size:13px">${s.title}</div><div class="song-meta"><span class="song-artist">${s.artist}</span></div></div>
        <span class="song-dur">${fmt(s.duration)}</span>
      </div>`).join('')
    : '<div style="color:#727272;font-size:13px;padding:8px 0">End of queue</div>';
}

function startTimer() {
  clearInterval(timer);
  timer = setInterval(() => {
    if (!isPlaying || !currentSong) return;
    progress = Math.min(progress + 100 / currentSong.duration, 100);
    const secs = (progress / 100) * currentSong.duration;
    document.getElementById('progressFill').style.width = progress + '%';
    document.getElementById('miniProgressFill').style.width = progress + '%';
    document.getElementById('currentTime').textContent = fmt(secs);
    if (progress >= 100) { clearInterval(timer); isPlaying = false; setPlayIcons(false); }
  }, 1000);
}

function togglePlay() {
  if (!currentSong) return;
  isPlaying = !isPlaying;
  setPlayIcons(isPlaying);
  if (isPlaying) startTimer(); else clearInterval(timer);
  document.getElementById('npArt').classList.toggle('playing', isPlaying);
}

function setPlayIcons(playing) {
  const pause = '⏸';
  const play = '▶';
  document.getElementById('mainPlayIcon').textContent = playing ? pause : play;
  document.getElementById('miniPlayIcon').textContent = playing ? pause : play;
}

function nextSong() {
  if (!currentSong) return;
  const idx = SONGS.findIndex(s => s.id === currentSong.id);
  const ni = isShuffle ? Math.floor(Math.random() * SONGS.length) : (idx+1) % SONGS.length;
  playSong(SONGS[ni].id);
}

function prevSong() {
  if (!currentSong) return;
  const idx = SONGS.findIndex(s => s.id === currentSong.id);
  playSong(SONGS[(idx - 1 + SONGS.length) % SONGS.length].id);
}

function seekTo(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  progress = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
  document.getElementById('progressFill').style.width = progress + '%';
  document.getElementById('miniProgressFill').style.width = progress + '%';
  const secs = (progress/100) * (currentSong ? currentSong.duration : 0);
  document.getElementById('currentTime').textContent = fmt(secs);
}

function setVol(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  const v = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
  document.getElementById('volFill').style.width = v + '%';
}

function toggleShuffle() {
  isShuffle = !isShuffle;
  document.getElementById('shuffleBtn').classList.toggle('active', isShuffle);
}

function toggleRepeat() {
  isRepeat = !isRepeat;
  document.getElementById('repeatBtn').classList.toggle('active', isRepeat);
}

function toggleLike() {
  if (!currentSong) return;
  likedSongs.has(currentSong.id) ? likedSongs.delete(currentSong.id) : likedSongs.add(currentSong.id);
  updateHeart();
  document.getElementById('likedCount').textContent = `Playlist • ${likedSongs.size} songs`;
}

function updateHeart() {
  const liked = currentSong && likedSongs.has(currentSong.id);
  document.getElementById('heartBtn').innerHTML = liked
    ? `<svg width="24" height="24" viewBox="0 0 24 24" fill="#ff4d4d" stroke="#ff4d4d" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`
    : `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#b3b3b3" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
}

// ── NAV ───────────────────────────────────────────────
function showTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('nav-' + tab).classList.add('active');
}

function openNowPlaying() {
  document.getElementById('nowPlaying').classList.add('open');
}

function closeNowPlaying() {
  document.getElementById('nowPlaying').classList.remove('open');
}

// ── START ─────────────────────────────────────────────
init();
</script>
</body>
</html>
